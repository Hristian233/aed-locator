name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: aed
          POSTGRES_PASSWORD: aed
          POSTGRES_DB: aed_locator
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aed -d aed_locator"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt email-validator
      - run: python3 -m pytest
        env:
          DATABASE_URL: postgresql+asyncpg://aed:aed@localhost:5432/aed_locator
      - run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://aed:aed@localhost:5432/aed_locator
      - run: python -c "from app.main import app; print(app.title)"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
