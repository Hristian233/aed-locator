# Example Cloud Run service for the API (adjust project/region)
# Deploy: gcloud run services replace deploy/cloud-run-api.yaml --region=us-central1
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: aed-locator-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "20"
        run.googleapis.com/cloudsql-instances: PROJECT:REGION:INSTANCE
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        - image: gcr.io/PROJECT_ID/aed-locator-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: ENVIRONMENT
              value: production
            # GCS buckets auto-resolve from ENVIRONMENT (prod -> aed-locator-prod-*).
            # Override with GCS_TEMP_BUCKET / GCS_IMAGES_BUCKET if needed.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aed-locator-secrets
                  key: database_url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aed-locator-secrets
                  key: secret_key
            - name: STORAGE_BACKEND
              value: gcs
            - name: GCS_IMAGES_PUBLIC_URL_BASE
              value: "https://PLACEHOLDER.example/aed-images"
            - name: GCS_SIGNED_UPLOAD_TTL_SECONDS
              value: "900"
            - name: GCS_SIGNED_READ_TTL_SECONDS
              value: "3600"
            - name: IMAGE_PROCESSOR_URL
              valueFrom:
                secretKeyRef:
                  name: aed-locator-secrets
                  key: image_processor_url
            - name: MAX_IMAGE_BYTES
              value: "10485760"
            - name: ALLOWED_IMAGE_TYPES
              value: image/jpeg,image/png,image/webp
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
